# 王者之奕 - Alembic 迁移配置
#
# 使用方式:
#   # 生成迁移脚本
#   alembic revision --autogenerate -m "初始化数据库"
#
#   # 执行迁移
#   alembic upgrade head
#
#   # 回滚迁移
#   alembic downgrade -1

[alembic]
# 迁移脚本目录
script_location = migrations

# 版本文件模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时区设置
timezone = Asia/Shanghai

# 是否截断长消息
truncate_slug_length = 40

# 版本目录
version_path_separator = os

# 输出编码
output_encoding = utf-8

# 数据库连接URL（可以通过环境变量覆盖）
# sqlalchemy.url = mysql+aiomysql://root:password@localhost/wangzhe

[post_write_hooks]
# 生成迁移脚本后执行的钩子
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
